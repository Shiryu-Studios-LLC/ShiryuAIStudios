<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <defs>
    <linearGradient id="flameGrad" x1="50%" y1="100%" x2="50%" y2="0%">
      <stop offset="0%" stop-color="#ff2d95"/>
      <stop offset="35%" stop-color="#c72fff"/>
      <stop offset="65%" stop-color="#7b2fff"/>
      <stop offset="100%" stop-color="#00d4ff"/>
    </linearGradient>
    <linearGradient id="innerGrad" x1="50%" y1="100%" x2="50%" y2="0%">
      <stop offset="0%" stop-color="#ff2d95" stop-opacity="0.4"/>
      <stop offset="100%" stop-color="#00d4ff" stop-opacity="0.2"/>
    </linearGradient>
    <radialGradient id="glowGrad" cx="50%" cy="40%">
      <stop offset="0%" stop-color="#7b2fff" stop-opacity="0.3"/>
      <stop offset="100%" stop-color="#7b2fff" stop-opacity="0"/>
    </radialGradient>
    <filter id="outerGlow">
      <feGaussianBlur stdDeviation="12" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <filter id="softGlow">
      <feGaussianBlur stdDeviation="20" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="512" height="512" rx="96" fill="#0a0e27"/>

  <!-- Ambient glow -->
  <ellipse cx="256" cy="280" rx="180" ry="120" fill="url(#glowGrad)" filter="url(#softGlow)"/>

  <!-- Main flame shape -->
  <g filter="url(#outerGlow)">
    <path d="M 256 60 
             C 256 60, 120 200, 135 290 
             C 142 330, 175 360, 195 375 
             C 210 386, 225 395, 256 420 
             C 287 395, 302 386, 317 375 
             C 337 360, 370 330, 377 290 
             C 392 200, 256 60, 256 60 Z" 
          fill="url(#flameGrad)"/>
  </g>

  <!-- Inner flame cutout for depth -->
  <path d="M 256 150 
           C 256 150, 175 245, 185 300 
           C 190 325, 210 345, 225 355 
           C 235 362, 245 368, 256 385 
           C 267 368, 277 362, 287 355 
           C 302 345, 322 325, 327 300 
           C 337 245, 256 150, 256 150 Z" 
        fill="#0a0e27" opacity="0.6"/>

  <!-- Core hot center -->
  <ellipse cx="256" cy="310" rx="25" ry="40" fill="#fff" opacity="0.15"/>
  <ellipse cx="256" cy="320" rx="12" ry="20" fill="#fff" opacity="0.25"/>

  <!-- Top point highlight -->
  <circle cx="256" cy="65" r="4" fill="#00d4ff" opacity="0.8"/>

  <!-- Side accent sparks -->
  <circle cx="185" cy="250" r="3" fill="#00d4ff" opacity="0.5"/>
  <circle cx="327" cy="250" r="3" fill="#ff2d95" opacity="0.5"/>
  <circle cx="200" cy="350" r="2" fill="#7b2fff" opacity="0.4"/>
  <circle cx="312" cy="350" r="2" fill="#c72fff" opacity="0.4"/>
</svg>
